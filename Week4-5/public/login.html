<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – BIT3208</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="logo">BIT3208 SMS</div>
      <h1>Welcome back</h1>
      <p class="sub">Sign in to your account</p>
      <div id="alert" class="alert"></div>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••">
      </div>
      <button class="btn btn-primary btn-full" id="loginBtn">Sign In</button>
      <p class="link-row">Don't have an account? <a href="/register">Register</a></p>
    </div>
  </div>
  <script>
    // JWT is stored in localStorage – NO cookies used
    if (localStorage.getItem('token')) window.location.href = '/dashboard';

    const show = (msg, type='danger') => {
      const el = document.getElementById('alert');
      el.textContent = msg; el.className = `alert alert-${type} show`;
    };

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!email || !password) return show('Please fill in all fields.');

      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Signing in…';

      try {
        const res  = await fetch('/api/auth/login', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!data.success) { show(data.message || 'Login failed.'); btn.disabled=false; btn.textContent='Sign In'; return; }

        // Store JWT in localStorage (no cookie)
        localStorage.setItem('token', data.token);
        localStorage.setItem('user',  JSON.stringify(data.user));
        window.location.href = '/dashboard';
      } catch (e) { show('Network error. Is the server running?'); btn.disabled=false; btn.textContent='Sign In'; }
    });

    // Allow Enter key
    document.addEventListener('keydown', e => { if (e.key==='Enter') document.getElementById('loginBtn').click(); });
  </script>
</body>
</html>
