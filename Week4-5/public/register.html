<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register – BIT3208</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="logo">BIT3208 SMS</div>
      <h1>Create account</h1>
      <p class="sub">Fill in the form below to register</p>
      <div id="alert" class="alert"></div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="johndoe">
      </div>
      <div class="form-group">
        <label>Email address</label>
        <input type="email" id="email" placeholder="you@example.com">
      </div>
      <div class="form-group">
        <label>Password <span id="strength" style="float:right;font-size:.78rem;font-weight:400"></span></label>
        <input type="password" id="password" placeholder="Min 6 characters">
      </div>
      <button class="btn btn-primary btn-full" id="regBtn">Create Account</button>
      <p class="link-row">Already have an account? <a href="/login">Sign in</a></p>
    </div>
  </div>
  <script>
    // Password strength indicator (Week 3 concept: JS form validation)
    document.getElementById('password').addEventListener('input', function() {
      const v = this.value, el = document.getElementById('strength');
      if (!v) { el.textContent = ''; return; }
      let s = 0;
      if (v.length >= 8) s++;
      if (/[A-Z]/.test(v)) s++;
      if (/[0-9]/.test(v)) s++;
      if (/[^A-Za-z0-9]/.test(v)) s++;
      const labels = ['','Weak','Fair','Good','Strong'];
      const colors = ['','#ef4444','#f59e0b','#3b82f6','#22c55e'];
      el.textContent = labels[s] || 'Weak';
      el.style.color = colors[s] || colors[1];
    });

    const show = (msg, type='danger') => {
      const el = document.getElementById('alert');
      el.textContent = msg; el.className = `alert alert-${type} show`;
    };

    document.getElementById('regBtn').addEventListener('click', async () => {
      const username = document.getElementById('username').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      if (!username || !email || !password) return show('All fields are required.');
      if (password.length < 6) return show('Password must be at least 6 characters.');

      const btn = document.getElementById('regBtn');
      btn.disabled = true; btn.textContent = 'Creating…';

      try {
        const res  = await fetch('/api/auth/register', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password }),
        });
        const data = await res.json();
        if (!data.success) { show(data.message || JSON.stringify(data.errors)); btn.disabled=false; btn.textContent='Create Account'; return; }
        show('Account created! Redirecting to login…', 'success');
        setTimeout(() => window.location.href = '/login', 1500);
      } catch (e) { show('Network error.'); btn.disabled=false; btn.textContent='Create Account'; }
    });
  </script>
</body>
</html>
